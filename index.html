<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Bee - ¡rvore GenealÛgica</title>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fascinate&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen">
        <div class="splash-content">
            <h1 id="beeText">
                <span>B</span><span>e</span><span>e</span>
            </h1>
            <span id="houseText">
                <span>H</span><span>o</span><span>u</span><span>s</span><span>e</span><span id="hive">??</span>
            </span>
            <div id="beeIcon">??</div>
            <div class="trail"></div>
        </div>
    </div>

    <!-- Container Principal do Site -->
    <div id="mainContent" style="display: none;">
        <header class="header">
            <div class="honey-logo">
                <h1>House Bee</h1>
                <p>Nossa Grande Colmeia Familiar</p>
            </div>
            
            <div id="familyNav" class="family-tabs">
                <!-- Botıes de famÌlias ser„o gerados via JS -->
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar membro...">
                <button onclick="buscarMembro()">??</button>
            </div>
        </header>

        <main class="tree-canvas">
            <div id="treeContainer">
                <p>Carregando membros da colmeia...</p>
            </div>
        </main>

        <section id="managementSection" class="admin-panel" style="display: none;">
            <div class="admin-header">
                <h2>Gerenciar Colmeia</h2>
                <div class="admin-btns">
                    <button class="btn-primary" onclick="mostrarFormMembro()">+ Novo Membro</button>
                    <button class="btn-secondary" onclick="excluirFamilia()">Excluir FamÌlia</button>
                </div>
            </div>

            <!-- Form para FamÌlia -->
            <div class="admin-row">
                <input type="text" id="familyNameInput" placeholder="Nome da Nova FamÌlia">
                <button onclick="novaFamilia()">Criar FamÌlia</button>
            </div>

            <div id="memberForm" class="modal-form" style="display: none;">
                <div class="modal-content">
                    <h3>Cadastrar Nova Abelha</h3>
                    <input type="text" id="nomeMembro" placeholder="Nome" required>
                    <input type="text" id="sobrenomeMembro" placeholder="Sobrenome">
                    <select id="selectFamilia">
                        <option value="bee">Bee (Principal)</option>
                    </select>
                    
                    <select id="hierarquia" onchange="checkHierarquia()">
                        <option value="membro">Membro Comum</option>
                        <option value="patriarca">Patriarca / Matriarca</option>
                    </select>

                    <div id="parentescoFields">
                        <select id="selectPai"><option value="">Selecionar Pai...</option></select>
                        <select id="selectMae"><option value="">Selecionar M„e...</option></select>
                    </div>

                    <select id="selectConjuge">
                        <option value="">Selecionar CÙnjuge...</option>
                    </select>

                    <label for="fotoMembro">Foto de Perfil:</label>
                    <input type="file" id="fotoMembro" accept="image/*">
                    
                    <div class="form-footer">
                        <button class="btn-save" onclick="executarCadastro()">Cadastrar</button>
                        <button class="btn-cancel" onclick="document.getElementById('memberForm').style.display='none'">Cancelar</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modais GenÈricos -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>¡rea Secreta da Rainha</h3>
            <p>Digite a senha para gerenciar a colmeia:</p>
            <input type="password" id="adminPassword" placeholder="Senha Mestra">
            <button onclick="verificarSenha()">Entrar</button>
            <button onclick="fecharModal()">Voltar</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Editar Membro</h3>
            <input type="text" id="editNome" placeholder="Nome">
            <input type="text" id="editSobrenome" placeholder="Sobrenome">
            <label>Trocar Foto:</label>
            <input type="file" id="editFoto" accept="image/*">
            <button class="btn-save" onclick="salvarEdicaoMembro()">Salvar AlteraÁıes</button>
            <button onclick="fecharEditModal()">Cancelar</button>
        </div>
    </div>

    <div id="messageBox" class="message"></div>

    <script src="js/script.js"></script>
</body>
</html>
