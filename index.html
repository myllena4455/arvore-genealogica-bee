<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Bee - Árvore Genealógica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fascinate&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen">
        <div class="splash-content">
            <h1 id="beeText">
                <span>B</span><span>e</span><span>e</span>
            </h1>
            <span id="houseText">
                <span>H</span><span>o</span><span>u</span><span>s</span><span>e</span><span id="hive">🍯</span>
            </span>
            <div id="beeIcon">🐝</div>
            <div class="trail"></div>
        </div>
    </div>

    <section class="banner" id="mainContent" style="display: none;">
        <div class="banner-content">
            <h1>House Bee</h1>
        </div>
    </section>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Pesquisar membro ou família...">
        <button onclick="buscarMembro()">Buscar</button>
    </div>

    <nav id="familyNav">
    <button class="btn-family" onclick="filtrarFamilia('all')">Todas as Famílias</button>
    <button class="btn-family" onclick="filtrarFamilia('all')">Página Inicial</button>
</nav>
<div id="familyButtons" class="family-buttons"></div>



    <main id="treeContainer"></main>
<div id="managementSection" style="display: none;">
    <h2>Painel da House Bee</h2>
    
    <div class="admin-actions">
        <button onclick="mostrarFormMembro()">+ Adicionar Membro</button>
        <button onclick="adicionarFamiliaFromInput()">+ Nova Família</button>
        <button onclick="atualizarSelects()">Atualizar Listas</button>
        <button onclick="excluirFamilia()">Excluir Família</button>
    </div>

    <div class="family-creation">
        <input type="text" id="familyNameInput" placeholder="Digite o nome da nova família" />
        <button class="btn-family" onclick="adicionarFamiliaFromInput()">Criar Família</button>
    </div>

    <form id="memberForm" style="display:none;">
        <h3>Novo Integrante</h3>
        <input type="text" id="nomeMembro" placeholder="Nome do Personagem" required>
        <input type="text" id="sobrenomeMembro" placeholder="Sobrenome">
        <label>Foto (upload):</label>
        <input type="file" id="fotoMembro" accept="image/*">

        <label>Família:</label>
        <select id="selectFamilia"><option value="bee">Família Bee</option></select>

        <label>Cargo na Família:</label>
        <select id="hierarquia" onchange="checkHierarquia()">
            <option value="base">Membro Comum</option>
            <option value="patriarca">Patriarca / Matriarca (Topo)</option>
        </select>

        <div id="parentescoFields">
            <label>Vincular a (pais):</label>
            <select id="selectPai"><option value="">Selecionar Pai...</option></select>
            <select id="selectMae"><option value="">Selecionar Mãe...</option></select>
        </div>

        <label>Cônjuge (opcional):</label>
        <select id="selectConjuge"><option value="">Selecionar cônjuge...</option></select>

        <button type="button" class="btn-save" onclick="executarCadastro()">Confirmar Cadastro</button>
    </form>
</div>

    <div id="messageBox" class="message"></div>

    <!-- Modal de Edição de Membro -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Editar Personagem</h3>
            <input type="text" id="editNome" placeholder="Nome" required>
            <input type="text" id="editSobrenome" placeholder="Sobrenome">
            <label>Foto (upload):</label>
            <input type="file" id="editFoto" accept="image/*">
            <button class="btn-save" onclick="salvarEdicaoMembro()">Salvar Alterações</button>
            <button onclick="fecharEditModal()">Cancelar</button>
        </div>
    </div>

    <!-- Modal de Senha -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>Coloque a senha secreta da House Bee</h3>
            <input type="password" id="adminPassword" placeholder="Digite a senha...">
            <button onclick="verificarSenha()">Entrar</button>
            <button onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <footer>
        <p>House Bee © 2026. Todos os direitos reservados. Desenvolvido por Myllena.</p>
        <p>Mais informações: <a href="https://wa.me/5581986010094?text=Ol%C3%A1%20Myllena%2C%20vi%20o%20site%20e%20gostaria%20de%20saber%20mais%20sobre%20or%C3%A7amento%20de%20sites" target="_blank" rel="noopener noreferrer">Clique aqui</a> (WhatsApp: +55 81 98601-0094)</p>
    </footer>
    </div> <!-- Fechamento do mainContent -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
