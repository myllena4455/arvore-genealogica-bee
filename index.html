<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Bee - Árvore Genealógica</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <section class="banner">
        <div class="banner-content">
            <h1>House Bee</h1>
            <p>Conectando linhagens e histórias</p>
        </div>
    </section>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Pesquisar membro ou família...">
        <button onclick="buscarMembro()">Buscar</button>
    </div>
<nav id="familyNav">
   <button class="btn-family" onclick="filtrarFamilia('bee')">Família Bee</button>

   <button class="btn-family active" onclick="location.reload()">Página Inicial</button>

    <button id="btnNovaFamilia" class="btn-family admin-only" style="display: none;">Nova Família +</button>
    
    <button class="btn-admin-link" onclick="toggleAdminPanel()">Acesso Restrito</button>
</nav>



    <main id="treeContainer">
        <div class="member-card">
            <div class="photo-container">
                <img src="texte.png" alt="Foto">
            </div>
            <div class="info">
                <h3>Myh <span class="surname">Bee</span></h3>
                <p class="status">Matriarca</p>
            </div>
        </div>
    </main>
<div id="managementSection" style="display: none;">
    <h2>Painel da House Bee</h2>
    
    <div class="admin-actions">
        <button onclick="mostrarFormMembro()">+ Adicionar Membro</button>
        <button onclick="novaFamilia()">+ Nova Família</button>
    </div>

    <form id="memberForm" style="display:none;">
        <h3>Novo Integrante</h3>
        <input type="text" id="nomeMembro" placeholder="Nome do Personagem" required>
        <input type="text" id="sobrenomeMembro" placeholder="Sobrenome">
        <input type="url" id="fotoMembro" placeholder="Link da Foto">

        <label>Cargo na Família:</label>
        <select id="hierarquia" onchange="checkHierarquia()">
            <option value="base">Membro Comum</option>
            <option value="patriarca">Patriarca / Matriarca (Topo)</option>
        </select>

        <div id="parentescoFields">
            <label>Vincular a:</label>
            <select id="selectPai"><option value="">Selecionar Pai...</option></select>
            <select id="selectMae"><option value="">Selecionar Mãe...</option></select>
        </div>

        <button type="button" class="btn-save" onclick="executarCadastro()">Confirmar Cadastro</button>
    </form>
</div>

    <footer>
        <button id="adminLogin">Acesso Restrito (ADM)</button>
    </footer>
    <script src="js/script.js"></script>

</body>
</html>
